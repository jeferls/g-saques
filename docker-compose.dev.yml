# version: "3.8"

services:
  app:
    build: .
    working_dir: /var/www/html/src
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/src/vendor
    depends_on:
      - xgrow-by-greenn-saques-hub-mysql
    networks:
      - greenn-network

  xgrow-by-greenn-saques-hub-nginx:
    container_name: xgrow-by-greenn-saques-hub-nginx
    image: nginx:alpine
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8017:80"
    depends_on:
      - app
    networks:
      - greenn-network

  xgrow-by-greenn-saques-hub-mysql:
    container_name: xgrow-by-greenn-saques-hub-mysql
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: saques-hub
      MYSQL_USER: appuser
      MYSQL_PASSWORD: secret
    volumes:
      - xgrow-by-greenn-saques-hub_data:/var/lib/mysql
    ports:
      - "3317:3306"
    networks:
      - greenn-network

  xgrow-by-greenn-saques-hub-rabbitmq:
    container_name: xgrow-by-greenn-saques-hub-rabbitmq
    image: rabbitmq:3.10.6-management-alpine
    ports:
      - "15617:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - xgrow-by-greenn-saques-hub-rabbitmqdata:/var/lib/rabbitmq/mnesia/
    networks:
      - greenn-network

  pm2:
    container_name: pm2
    build: .
    working_dir: /var/www/html/src
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/src/vendor
    depends_on:
      - app
      - xgrow-by-greenn-saques-hub-mysql
      - xgrow-by-greenn-saques-hub-rabbitmq
    command: ["pm2-runtime", "storage/workers/dev.json"]
    networks:
      - greenn-network

networks:
  greenn-network:
    driver: bridge
    external: true

volumes:
  xgrow-by-greenn-saques-hub_data:
    driver: local
  xgrow-by-greenn-saques-hub-rabbitmqdata:
    driver: local
  vendor:
